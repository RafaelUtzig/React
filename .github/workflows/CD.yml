name: React CD (Deploy to GitHub Pages & DockerHub)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Job 1: Publica o site no GitHub Pages (seu código original mantido)
  deploy-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código 📥
        uses: actions/checkout@v4

      - name: Configurar Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar e Build 🏗️
        working-directory: ./calculadora
        run: |
          npm install
          npm run build

      - name: Deploy para o GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: calculadora/dist
          branch: gh-pages

  # Job 2: Publica a imagem no DockerHub (Desafio Extra)
  publish-docker:
    runs-on: ubuntu-latest
    # A linha abaixo garante que a imagem só vai pro DockerHub quando o código for para a main (ignora PRs)
    if: github.ref == 'refs/heads/main' 
    
    steps:
      - name: Checkout do código 📥
        uses: actions/checkout@v4

      - name: Log in to Docker Hub 🐳
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Docker image 📦
        uses: docker/build-push-action@v5
        with:
          context: ./calculadora # Aponta para a subpasta onde está o seu Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/calculadora:latest
