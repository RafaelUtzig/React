name: React CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código 📥
        uses: actions/checkout@v4

      - name: Configurar Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Removi a linha do cache para evitar o erro do lock file

      - name: Instalar Dependências 📦
        run: npm install

      - name: Executar Testes Unitários 🧪
        run: npm test -- --watchAll=false

      - name: Validar Build 🏗️
        run: npm run build
